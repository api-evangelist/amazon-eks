name: Amazon EKS API
description: >-
  Amazon Elastic Kubernetes Service (Amazon EKS) is a managed Kubernetes service
  that makes it easy to run Kubernetes on AWS without needing to install, operate,
  and maintain your own Kubernetes control plane or nodes. Amazon EKS runs
  upstream Kubernetes and is certified Kubernetes conformant, so you can use
  existing tools and plugins from partners and the Kubernetes community. Amazon
  EKS automatically manages the availability and scalability of the Kubernetes
  control plane nodes responsible for scheduling containers, managing application
  availability, storing cluster data, and other key tasks.
url: https://aws.amazon.com/eks/
baseURL: https://eks.amazonaws.com
humanURL: https://aws.amazon.com/eks/
tags:
  - Kubernetes
  - Containers
  - EKS
  - Container Orchestration
  - AWS

