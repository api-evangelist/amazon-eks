name: Amazon EKS
description: >-
  Amazon Elastic Kubernetes Service (Amazon EKS) is a managed Kubernetes service that
  makes it easy to run Kubernetes on AWS without needing to install, operate, and
  maintain your own Kubernetes control plane or nodes. Amazon EKS runs upstream Kubernetes
  and is certified Kubernetes conformant, so you can use existing tools and plugins
  from partners and the Kubernetes community.
