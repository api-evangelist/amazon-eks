                  description: "The maxResults parameter"
                - name: nextToken
                  in: query
                  type: string
                  required: false
                  description: "The nextToken parameter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: CreateAddon
              method: POST
              description: "Amazon EKS Create an EKS Add-on"
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "The name parameter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: clusters
          path: /clusters/{name}/addons/{addonName}
          description: "Operations for clusters resources."
          operations:
            - name: DescribeAddon
              method: GET
