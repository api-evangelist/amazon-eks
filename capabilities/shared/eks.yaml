                  in: path
                  type: string
                  required: true
                  description: "The fargateProfileName parameter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: DeleteFargateProfile
              method: DELETE
              description: "Amazon EKS Delete a Fargate Profile"
              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "The name parameter"
                - name: fargateProfileName
                  in: path
                  type: string
                  required: true
                  description: "The fargateProfileName parameter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
        - name: clusters
          path: /clusters/{name}/addons
          description: "Operations for clusters resources."
          operations:
