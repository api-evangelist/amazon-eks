              inputParameters:
                - name: name
                  in: path
                  type: string
                  required: true
                  description: "The name parameter"
                - name: maxResults
                  in: query
                  type: integer
                  required: false
                  description: "The maxResults parameter"
                - name: nextToken
                  in: query
                  type: string
                  required: false
                  description: "The nextToken parameter"
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: CreateFargateProfile
