    port: 8080
    description: REST adapter for Amazon EKS API — Addons. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/clusters/{name}/addons
      name: clusters-name-addons
      description: REST surface for clusters-name-addons.
      operations:
      - method: POST
        name: createaddon
        description: Amazon EKS Create an EKS Add-on
        call: amazon-eks-addons.createaddon
        with:
          name: rest.name
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
