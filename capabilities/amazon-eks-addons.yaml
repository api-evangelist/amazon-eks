        method: POST
        description: Amazon EKS Create an EKS Add-on
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: listaddons
        method: GET
        description: Amazon EKS List EKS Add-ons
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: name
          in: path
          type: string
          required: true
        - name: maxResults
          in: query
          type: integer
        - name: nextToken
          in: query
          type: string
    - name: clusters-name-addons-addonName
