      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        example: example-resource-name
      - name: nodegroupName
        in: path
        required: true
        schema:
          type: string
        example: example-cluster-01
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeNodegroupResponse'
              examples:
                DescribeNodegroup200Example:
                  summary: Default DescribeNodegroup 200 response
                  x-microcks-default: true
                  value:
                    nodegroup: example-cluster-01
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '404':
          description: Not found
        '429':
          description: Too many requests
        '500':
          description: Internal server error
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: DeleteNodegroup
      summary: Amazon EKS Delete a Managed Node Group
      description: Deletes an Amazon EKS managed node group for a cluster.
      tags:
      - Node Groups
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        example: example-resource-name
      - name: nodegroupName
        in: path
        required: true
        schema:
          type: string
        example: example-cluster-01
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteNodegroupResponse'
              examples:
                DeleteNodegroup200Example:
                  summary: Default DeleteNodegroup 200 response
                  x-microcks-default: true
                  value:
                    nodegroup: example-cluster-01
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '404':
          description: Not found
        '409':
          description: Conflict
        '429':
          description: Too many requests
        '500':
          description: Internal server error

      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /clusters/{name}/fargate-profiles:
    post:
      operationId: CreateFargateProfile
      summary: Amazon EKS Create a Fargate Profile
      description: >-
        Creates an AWS Fargate profile for your Amazon EKS cluster. You must
        have at least one Fargate profile in a cluster to be able to run pods
        on Fargate.
      tags:
      - Fargate Profiles
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        example: example-resource-name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateFargateProfileRequest'
            examples:
              CreateFargateProfileRequestExample:
                summary: Default CreateFargateProfile request
                x-microcks-default: true
                value:
                  fargateProfileName: example-resource-name
                  podExecutionRoleArn: arn:aws:service:us-east-1:123456789012:resource/example
                  subnets:
                  - example-string
                  selectors:
                  - example-string
                  tags: {}
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateFargateProfileResponse'
              examples:
                CreateFargateProfile200Example:
                  summary: Default CreateFargateProfile 200 response
                  x-microcks-default: true
                  value:
                    fargateProfile: example-string
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '404':
          description: Not found
        '409':
          description: Conflict
        '429':
          description: Too many requests
        '500':
          description: Internal server error
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    get:
      operationId: ListFargateProfiles
      summary: Amazon EKS List Fargate Profiles
      description: Lists the AWS Fargate profiles associated with the specified cluster.
      tags:
      - Fargate Profiles
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        example: example-resource-name
      - name: maxResults
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
        example: 1
      - name: nextToken
        in: query
        schema:
          type: string
        example: example-string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListFargateProfilesResponse'
              examples:
                ListFargateProfiles200Example:
                  summary: Default ListFargateProfiles 200 response
                  x-microcks-default: true
                  value:
                    fargateProfileNames:
                    - example-resource-name
                    nextToken: example-string
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '404':
          description: Not found
        '429':
          description: Too many requests
        '500':
          description: Internal server error

      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /clusters/{name}/fargate-profiles/{fargateProfileName}:
    get:
      operationId: DescribeFargateProfile
      summary: Amazon EKS Describe a Fargate Profile
      description: Returns descriptive information about an AWS Fargate profile.
      tags:
      - Fargate Profiles
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        example: example-resource-name
      - name: fargateProfileName
        in: path
        required: true
        schema:
          type: string
        example: example-resource-name
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeFargateProfileResponse'
              examples:
                DescribeFargateProfile200Example:
                  summary: Default DescribeFargateProfile 200 response
                  x-microcks-default: true
                  value:
                    fargateProfile: example-string
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '404':
          description: Not found
        '429':
          description: Too many requests
        '500':
          description: Internal server error
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: DeleteFargateProfile
      summary: Amazon EKS Delete a Fargate Profile
      description: Deletes an AWS Fargate profile.
      tags:
      - Fargate Profiles
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        example: example-resource-name
      - name: fargateProfileName
        in: path
        required: true
        schema:
          type: string
        example: example-resource-name
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteFargateProfileResponse'
              examples:
                DeleteFargateProfile200Example:
                  summary: Default DeleteFargateProfile 200 response
                  x-microcks-default: true
                  value:
                    fargateProfile: example-string
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '404':
          description: Not found
        '409':
          description: Conflict
        '429':
          description: Too many requests
        '500':
          description: Internal server error

      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /clusters/{name}/addons:
    post:
      operationId: CreateAddon
      summary: Amazon EKS Create an EKS Add-on
      description: >-
        Creates an Amazon EKS add-on. Amazon EKS add-ons help to automate the
        provisioning and lifecycle management of common operational software
        for Amazon EKS clusters.
      tags:
      - Addons
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        example: example-resource-name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateAddonRequest'
            examples:
              CreateAddonRequestExample:
                summary: Default CreateAddon request
                x-microcks-default: true
                value:
                  addonName: example-resource-name
                  addonVersion: 5.0.0
                  serviceAccountRoleArn: arn:aws:service:us-east-1:123456789012:resource/example
                  resolveConflicts: OVERWRITE
                  tags: {}
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateAddonResponse'
              examples:
                CreateAddon200Example:
                  summary: Default CreateAddon 200 response
                  x-microcks-default: true
                  value:
                    addon: example-string
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '404':
          description: Not found
        '409':
          description: Conflict
        '429':
          description: Too many requests
        '500':
          description: Internal server error
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    get:
      operationId: ListAddons
      summary: Amazon EKS List EKS Add-ons
      description: Lists the available add-ons for an Amazon EKS cluster.
      tags:
      - Addons
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        example: example-resource-name
      - name: maxResults
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
        example: 1
      - name: nextToken
        in: query
        schema:
          type: string
        example: example-string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListAddonsResponse'
              examples:
                ListAddons200Example:
                  summary: Default ListAddons 200 response
                  x-microcks-default: true
                  value:
                    addons:
                    - example-string
                    nextToken: example-string
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '404':
          description: Not found
        '429':
          description: Too many requests
        '500':
          description: Internal server error

      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /clusters/{name}/addons/{addonName}:
    get:
      operationId: DescribeAddon
      summary: Amazon EKS Describe an EKS Add-on
      description: Describes an Amazon EKS add-on.
      tags:
      - Addons
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        example: example-resource-name
      - name: addonName
        in: path
        required: true
        schema:
          type: string
        example: example-resource-name
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeAddonResponse'
              examples:
                DescribeAddon200Example:
                  summary: Default DescribeAddon 200 response
                  x-microcks-default: true
                  value:
                    addon: example-string
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '404':
          description: Not found
        '429':
          description: Too many requests
        '500':
          description: Internal server error
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: DeleteAddon
      summary: Amazon EKS Delete an EKS Add-on
      description: Deletes an Amazon EKS add-on.
      tags:
      - Addons
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        example: example-resource-name
      - name: addonName
        in: path
        required: true
        schema:
          type: string
        example: example-resource-name
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAddonResponse'
              examples:
                DeleteAddon200Example:
                  summary: Default DeleteAddon 200 response
                  x-microcks-default: true
                  value:
                    addon: example-string
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '404':
          description: Not found
        '409':
          description: Conflict
        '429':
          description: Too many requests
        '500':
          description: Internal server error

      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
components:
  schemas:

    Cluster:
      type: object
      properties:
        name:
          type: string
          description: The name of the cluster.
          example: example-resource-name
        arn:
          type: string
          description: The Amazon Resource Name (ARN) of the cluster.
          example: arn:aws:service:us-east-1:123456789012:resource/example
        createdAt:
          type: string
          format: date-time
          description: The Unix epoch timestamp at object creation.
          example: '2025-03-15T14:30:00Z'
        version:
          type: string
          description: The Kubernetes server version for the cluster.
          example: 5.0.0
        endpoint:
          type: string
          description: The endpoint for your Kubernetes API server.
          example: example-string
        roleArn:
          type: string
          description: The Amazon Resource Name (ARN) of the IAM role.
          example: arn:aws:service:us-east-1:123456789012:resource/example
        resourcesVpcConfig:
          $ref: '#/components/schemas/VpcConfigResponse'
        kubernetesNetworkConfig:
          $ref: '#/components/schemas/KubernetesNetworkConfigResponse'
        logging:
          $ref: '#/components/schemas/Logging'
        status:
          type: string
          enum:
          - CREATING
          - ACTIVE
          - DELETING
          - FAILED
          - UPDATING
          - PENDING
          description: The current status of the cluster.
          example: CREATING
        certificateAuthority:
          type: object
          properties:
            data:
              type: string
              description: The Base64-encoded certificate data.
          example:
            data: example-string
        platformVersion:
          type: string
          description: The platform version of your Amazon EKS cluster.
          example: 5.0.0
        tags:
          type: object
          additionalProperties:
            type: string
          description: Metadata that assists with categorization and organization.

          example: {}
    Nodegroup:
      type: object
      properties:
        nodegroupName:
          type: string
          description: The name of the managed node group.
          example: example-cluster-01
        nodegroupArn:
          type: string
          description: The Amazon Resource Name (ARN) of the managed node group.
          example: arn:aws:service:us-east-1:123456789012:resource/example
        clusterName:
          type: string
          description: The name of the cluster the node group is associated with.
          example: example-cluster-01
        version:
          type: string
          description: The Kubernetes version of the managed node group.
          example: 5.0.0
        releaseVersion:
          type: string
          description: The AMI version of the managed node group.
          example: 5.0.0
        status:
          type: string
          enum:
          - CREATING
          - ACTIVE
          - UPDATING
          - DELETING
          - CREATE_FAILED
          - DELETE_FAILED
          - DEGRADED
          description: The current status of the managed node group.
          example: CREATING
        capacityType:
          type: string
          enum:
          - ON_DEMAND
          - SPOT
          description: The capacity type of the managed node group.
          example: ON_DEMAND
        scalingConfig:
          $ref: '#/components/schemas/NodegroupScalingConfig'
        instanceTypes:
          type: array
          items:
            type: string
          description: The instance types associated with the managed node group.
          example:
          - i-0abc123def456789
        subnets:
          type: array
          items:
            type: string
          description: The subnets that were specified for the Auto Scaling group.
          example:
          - example-string
        amiType:
          type: string
          enum:
          - AL2_x86_64
          - AL2_x86_64_GPU
          - AL2_ARM_64
          - BOTTLEROCKET_ARM_64
          - BOTTLEROCKET_x86_64
          description: The AMI type associated with the managed node group.
          example: AL2_x86_64
        nodeRole:
          type: string
          description: The IAM role associated with the managed node group.
          example: example-string
        labels:
          type: object
          additionalProperties:
            type: string
          description: The Kubernetes labels applied to the nodes in the node group.
          example: {}
        tags:
          type: object
          additionalProperties:
            type: string
          description: Metadata that assists with categorization and organization.
          example: {}
        createdAt:
          type: string
          format: date-time
          description: The Unix epoch timestamp at object creation.
          example: '2025-03-15T14:30:00Z'
        modifiedAt:
          type: string
          format: date-time
          description: The Unix epoch timestamp for the last modification.

          example: '2025-03-15T14:30:00Z'
    FargateProfile:
      type: object
      properties:
        fargateProfileName:
          type: string
          description: The name of the Fargate profile.
          example: example-resource-name
        fargateProfileArn:
          type: string
          description: The full Amazon Resource Name (ARN) of the Fargate profile.
          example: arn:aws:service:us-east-1:123456789012:resource/example
        clusterName:
          type: string
          description: The name of the cluster the Fargate profile is associated with.
          example: example-cluster-01
        status:
          type: string
          enum:
          - CREATING
          - ACTIVE
          - DELETING
          - CREATE_FAILED
