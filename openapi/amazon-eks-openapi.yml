openapi: 3.1.0
info:
  title: Amazon EKS API
  description: >-
    Amazon Elastic Kubernetes Service (Amazon EKS) is a managed Kubernetes
    service that makes it easy to run Kubernetes on AWS without needing to
    install, operate, and maintain your own Kubernetes control plane or nodes.
  version: '2017-11-01'
  contact:
    name: Amazon Web Services
    url: https://aws.amazon.com/eks/
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
- url: https://eks.amazonaws.com
  description: Amazon EKS API

paths:

  /clusters:
    post:
      operationId: CreateCluster
      summary: Amazon EKS Create a New EKS Cluster
      description: >-
        Creates an Amazon EKS control plane. The Amazon EKS control plane
        consists of control plane instances that run the Kubernetes software,
        such as etcd and the API server.
      tags:
      - Clusters
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateClusterRequest'
            examples:
              CreateClusterRequestExample:
                summary: Default CreateCluster request
                x-microcks-default: true
                value:
                  name: example-resource-name
                  version: 5.0.0
                  roleArn: arn:aws:service:us-east-1:123456789012:resource/example
                  resourcesVpcConfig:
                    subnetIds:
                    - example-id-1234
                    securityGroupIds:
                    - example-cluster-01
                    endpointPublicAccess: true
                  kubernetesNetworkConfig:
                    serviceIpv4Cidr: example-id-1234
                    ipFamily: ipv4
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateClusterResponse'
              examples:
                CreateCluster200Example:
                  summary: Default CreateCluster 200 response
                  x-microcks-default: true
                  value:
                    cluster: example-cluster-01
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '409':
          description: Conflict
        '429':
          description: Too many requests
        '500':
          description: Internal server error
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    get:
      operationId: ListClusters
      summary: Amazon EKS List EKS Clusters
      description: Lists the Amazon EKS clusters in your AWS account in the specified Region.
      tags:
      - Clusters
      parameters:
      - name: maxResults
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
        example: 1
      - name: nextToken
        in: query
        schema:
          type: string
        example: example-string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListClustersResponse'
              examples:
                ListClusters200Example:
                  summary: Default ListClusters 200 response
                  x-microcks-default: true
                  value:
                    clusters:
                    - example-cluster-01
                    nextToken: example-string
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '429':
          description: Too many requests
        '500':
          description: Internal server error

      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /clusters/{name}:
    get:
      operationId: DescribeCluster
      summary: Amazon EKS Describe an EKS Cluster
      description: >-
        Returns descriptive information about an Amazon EKS cluster.
      tags:
      - Clusters
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        example: example-resource-name
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DescribeClusterResponse'
              examples:
                DescribeCluster200Example:
                  summary: Default DescribeCluster 200 response
                  x-microcks-default: true
                  value:
                    cluster: example-cluster-01
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '404':
          description: Not found
        '429':
          description: Too many requests
        '500':
          description: Internal server error
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    delete:
      operationId: DeleteCluster
      summary: Amazon EKS Delete an EKS Cluster
      description: >-
        Deletes the Amazon EKS cluster control plane. You must delete all
        node groups and Fargate profiles before deleting a cluster.
      tags:
      - Clusters
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        example: example-resource-name
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteClusterResponse'
              examples:
                DeleteCluster200Example:
                  summary: Default DeleteCluster 200 response
                  x-microcks-default: true
                  value:
                    cluster: example-cluster-01
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '404':
          description: Not found
        '409':
          description: Conflict
        '429':
          description: Too many requests
        '500':
          description: Internal server error

      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /clusters/{name}/node-groups:
    post:
      operationId: CreateNodegroup
      summary: Amazon EKS Create a Managed Node Group
      description: >-
        Creates a managed node group for an Amazon EKS cluster. You can only
        create a node group for your cluster that is equal to the current
        Kubernetes version for the cluster.
      tags:
      - Node Groups
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        example: example-resource-name
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateNodegroupRequest'
            examples:
              CreateNodegroupRequestExample:
                summary: Default CreateNodegroup request
                x-microcks-default: true
                value:
                  nodegroupName: example-cluster-01
                  nodeRole: example-string
                  subnets:
                  - example-string
                  scalingConfig: example-string
                  instanceTypes:
                  - i-0abc123def456789
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateNodegroupResponse'
              examples:
                CreateNodegroup200Example:
                  summary: Default CreateNodegroup 200 response
                  x-microcks-default: true
                  value:
                    nodegroup: example-cluster-01
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '404':
          description: Not found
        '409':
          description: Conflict
        '429':
          description: Too many requests
        '500':
          description: Internal server error
      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
    get:
      operationId: ListNodegroups
      summary: Amazon EKS List Managed Node Groups
      description: Lists the managed node groups associated with the specified cluster.
      tags:
      - Node Groups
      parameters:
      - name: name
        in: path
        required: true
        schema:
          type: string
        example: example-resource-name
      - name: maxResults
        in: query
        schema:
          type: integer
          minimum: 1
          maximum: 100
        example: 1
      - name: nextToken
        in: query
        schema:
          type: string
        example: example-string
      responses:
        '200':
          description: Successful response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListNodegroupsResponse'
              examples:
                ListNodegroups200Example:
                  summary: Default ListNodegroups 200 response
                  x-microcks-default: true
                  value:
                    nodegroups:
                    - example-cluster-01
                    nextToken: example-string
        '400':
          description: Bad request
        '403':
          description: Forbidden
        '404':
          description: Not found
        '429':
          description: Too many requests
        '500':
          description: Internal server error

      x-microcks-operation:
        delay: 0
        dispatcher: FALLBACK
  /clusters/{name}/node-groups/{nodegroupName}:
    get:
      operationId: DescribeNodegroup
      summary: Amazon EKS Describe a Managed Node Group
      description: Returns descriptive information about a managed node group.
      tags:
